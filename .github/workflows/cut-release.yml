name: Cut release

# Dispatch-driven release entry point: pick a bump type (or exact version) and
# this runs the checks, creates the tag if it doesn't exist, and starts the
# release for it.
#
# The tag is pushed with the workflow's own GITHUB_TOKEN. Such pushes
# deliberately trigger no downstream workflows, so the job then dispatches
# release.yml for the tag explicitly — which also makes re-releasing an
# existing tag the same flow. No app credentials are used here: the bot's
# private key stays confined to release.yml's protected environment.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type (patch, minor, major) or exact version (e.g. 6.0.0 or 6.0.0-rc1)"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write # push the release tag
  actions: write # dispatch release.yml

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full tag history for the version computation

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # The old npm publish ran test+lint before shipping; keep that gate.
      - name: Checks
        run: make check

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          input="${{ github.event.inputs.version }}"
          # Exact versions may carry a semver prerelease suffix (6.0.0-rc1);
          # GoReleaser marks those prerelease and skips the tap/bucket/latest
          # pointers (see .goreleaser.yaml / release.yml).
          if [[ "$input" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            next="$input"
          else
            # Bump types compute from the latest STABLE tag — prerelease tags
            # (v6.0.0-rc1) are ignored so `patch` after an rc means "patch of
            # the last real release", and the arithmetic never sees a suffix.
            latest="$(git tag -l 'v*' --sort=-v:refname | grep -v -- - | head -1)"
            latest="${latest#v}"
            latest="${latest:-0.0.0}"
            IFS=. read -r major minor patch <<< "$latest"
            case "$input" in
              major) next="$((major+1)).0.0" ;;
              minor) next="$major.$((minor+1)).0" ;;
              patch) next="$major.$minor.$((patch+1))" ;;
              *) echo "::error::version must be patch, minor, major, or X.Y.Z[-suffix] (got '$input')"; exit 1 ;;
            esac
          fi
          if git rev-parse -q --verify "refs/tags/v$next" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Re-releasing existing tag v$next" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Releasing v$next" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "release: ${{ steps.version.outputs.tag }}"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"

      # GITHUB_TOKEN tag pushes don't trigger workflows, so start the release
      # explicitly (release.yml's guard only accepts tag refs, which this is).
      - name: Start release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "refs/tags/${{ steps.version.outputs.tag }}"
