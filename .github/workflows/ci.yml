name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Named `build` to satisfy the main ruleset's required status check (the
  # name carried over from the Node workflow it replaced).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: build
        run: make build

      - name: test
        run: go test -race -shuffle=on ./...

      # Symbol-level vulnerability reachability: fails only when our code
      # actually calls (or is compiled against) vulnerable code — including
      # stdlib/toolchain vulns dependabot can't see — and stays quiet on
      # module-level advisories whose code we never use. A failure here with
      # no diff usually means a new advisory landed in the vuln DB; triage
      # with `govulncheck -show verbose ./...`.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
