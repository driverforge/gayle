name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Named `build` to satisfy the main ruleset's required status check (the
  # name carried over from the Node workflow it replaced).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: build
        run: make build

      - name: test
        run: go test -race -shuffle=on ./...
