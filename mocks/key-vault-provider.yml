service: oprah-service
provider:
  name: key-vault
  vault: driverforge-${stage}

config:
  path: graph
  defaults:
    DB_NAME: my-database
    DB_HOST: 3200
  required:
    DB_TABLE: "some database table name for ${stage}"

secret:
  path: graph
  required:
    DB_PASSWORD: "secret database password"
