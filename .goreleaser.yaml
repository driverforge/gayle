# GoReleaser config — https://goreleaser.com
# On every `vX.Y.Z` tag this builds cross-platform binaries and publishes them to
# Azure Blob Storage (releases.driverforge.com) — the canonical source — then
# updates the Homebrew tap and Scoop bucket (whose download URLs point at Azure,
# NOT GitHub). A GitHub Release is still cut as an internal mirror. This mirrors
# the driverforge CLI's release pipeline; keep the two configs aligned.
# Validate with `goreleaser check`.
version: 2

project_name: gayle

before:
  hooks:
    - go mod tidy

builds:
  - id: gayle
    main: ./cmd/gayle
    binary: gayle
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/driverforge/gayle/internal/buildinfo.Version={{ .Version }}
      - -X github.com/driverforge/gayle/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/driverforge/gayle/internal/buildinfo.Date={{ .Date }}

# macOS code-signing + notarization (works on Linux CI via rcodesign — no Mac runner).
# Disabled until the signing secrets are present, so the unsigned launch works unchanged.
# To activate: obtain a Developer ID Application cert + an App Store Connect API key, add
# the secrets, and uncomment the MACOS_* env block in .github/workflows/release.yml.
# `enabled` is keyed on MACOS_SIGN_P12 being set; while it is unset the whole entry is
# skipped (the sign/notarize fields below are not evaluated).
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - gayle
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"       # base64 of the Developer ID .p12
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}" # App Store Connect API key issuer ID
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"       # API key ID
        key: "{{ .Env.MACOS_NOTARY_KEY }}"             # base64 of the .p8 API key
        wait: true
        timeout: 20m

archives:
  - id: gayle
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# Canonical distribution: upload archives + checksums to the Azure container
# `driverforge-releases` under `gayle/<tag>/`. Served publicly at
# https://releases.driverforge.com/driverforge-releases/gayle/<tag>/<file>.
# Auth via AZURE_STORAGE_ACCOUNT / AZURE_STORAGE_KEY (set in release.yml).
blobs:
  - provider: azblob
    bucket: driverforge-releases
    directory: "gayle/{{ .Tag }}"
    cache_control:
      - public
      - max-age=31536000
      - immutable

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# macOS: `brew install driverforge/tap/gayle`
# Casks are Homebrew's path for prebuilt binaries. The Go linker ad-hoc-signs the
# arm64 binary so it runs on Apple Silicon. While builds are NOT notarized, the
# post-install hook strips the Gatekeeper quarantine flag; once the MACOS_* signing
# secrets exist (see `notarize:` above) the hook auto-disables, because
# xattr-stripping is unnecessary — and discouraged — once signed.
homebrew_casks:
  - name: gayle
    # auto: prerelease tags (v6.0.0-rc1) are built and uploaded to Azure but
    # NOT pushed to the tap — `brew install` keeps serving the last stable.
    skip_upload: auto
    binaries:
      - gayle
    # Author as the GitHub App the push token belongs to (the id+login noreply
    # form gives the commit the proper bot badge/avatar), not goreleaser's
    # default goreleaserbot. The tap repos are public; only bot identities
    # may appear in their history.
    commit_author:
      name: driverforge-bot[bot]
      email: 264301095+driverforge-bot[bot]@users.noreply.github.com
    repository:
      owner: driverforge
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/driverforge/gayle"
    description: "Deploy configuration and secrets to AWS SSM Parameter Store or Azure Key Vault"
    # Download from Azure, not GitHub — the tap repo is public metadata, the binary
    # comes from releases.driverforge.com.
    url:
      template: "https://releases.driverforge.com/driverforge-releases/gayle/{{ .Tag }}/{{ .ArtifactName }}"
      verified: "releases.driverforge.com/driverforge-releases/gayle/"
    hooks:
      post:
        install: |
          {{- if not (isEnvSet "MACOS_SIGN_P12") }}
          # Unsigned build: remove the quarantine flag so Gatekeeper allows the binary.
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gayle"]
          end
          {{- else }}
          # Signed + notarized build: no quarantine workaround required.
          {{- end }}

# Windows: `scoop install gayle` (after `scoop bucket add driverforge https://github.com/driverforge/scoop-bucket`)
scoops:
  - name: gayle
    # Same prerelease handling as the cask: rc tags never reach the bucket.
    skip_upload: auto
    # Same bot attribution as the cask (see above).
    commit_author:
      name: driverforge-bot[bot]
      email: 264301095+driverforge-bot[bot]@users.noreply.github.com
    repository:
      owner: driverforge
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    # Download from Azure, not GitHub (see the cask note above).
    url_template: "https://releases.driverforge.com/driverforge-releases/gayle/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://github.com/driverforge/gayle"
    description: "Deploy configuration and secrets to AWS SSM Parameter Store or Azure Key Vault"
    license: "MIT"

release:
  github:
    owner: driverforge
    name: gayle
  # Mark semver-prerelease tags (v6.0.0-rc1) as GitHub prereleases.
  prerelease: auto
